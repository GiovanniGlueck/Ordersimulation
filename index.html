<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Geldanlagekurs Rechner</title>
  <style>
    :root {
      --bg: #eef3f9;
      --text: #1e293b;
      --muted: #64748b;
      --line: #d8e1ec;
      --accent: #1d4ed8;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .shell {
      min-height: 100vh;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 251, 255, 0.96);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tab-btn {
      border: 1px solid #bfd2ee;
      background: #fff;
      color: #334155;
      padding: 11px 14px;
      border-radius: 999px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: 160ms ease;
    }

    .tab-btn:hover {
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 10px 22px rgba(29, 78, 216, 0.22);
    }

    .frame-stage {
      min-height: calc(100vh - 67px);
    }

    .frame-wrap {
      display: none;
      min-height: calc(100vh - 67px);
    }

    .frame-wrap.active {
      display: block;
    }

    iframe {
      display: block;
      width: 100%;
      min-height: calc(100vh - 67px);
      border: 0;
      background: #fff;
    }

    @media (max-width: 900px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
        padding: 12px 14px;
      }

    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="shell">
      <div class="toolbar">
        <div class="tabs" role="tablist" aria-label="Tool-Auswahl">
          <button class="tab-btn active" type="button" data-target="frame-order" role="tab" aria-selected="true">Ordermaske</button>
          <button class="tab-btn" type="button" data-target="frame-vorsorge" role="tab" aria-selected="false">Altersvorsorge-Rechner</button>
          <button class="tab-btn" type="button" data-target="frame-steuern" role="tab" aria-selected="false">Steuer-Varianten</button>
        </div>
      </div>

      <div class="frame-stage">
        <section class="frame-wrap active" id="frame-order">
          <iframe id="iframe-order" src="ordermaske.html" title="Ordermaske Geldanlagekurs" loading="lazy"></iframe>
        </section>

        <section class="frame-wrap" id="frame-vorsorge">
          <iframe id="iframe-vorsorge" src="altersvorsorge_rechner.html" title="Altersvorsorgedepot vs. ETF" loading="lazy"></iframe>
        </section>

        <section class="frame-wrap" id="frame-steuern">
          <iframe id="iframe-steuern" src="steuer-varianten.html" title="Steuer-Varianten bei ETF-Anlagen" loading="lazy"></iframe>
        </section>
      </div>
    </section>
  </div>

  <script>
    const tabs = Array.from(document.querySelectorAll('.tab-btn'));
    const frames = Array.from(document.querySelectorAll('.frame-wrap'));
    const iframes = Array.from(document.querySelectorAll('iframe'));

    function setActive(targetId) {
      tabs.forEach((tab) => {
        const active = tab.dataset.target === targetId;
        tab.classList.toggle('active', active);
        tab.setAttribute('aria-selected', String(active));
      });

      frames.forEach((frame) => {
        frame.classList.toggle('active', frame.id === targetId);
      });

      const activeFrame = document.querySelector(`#${targetId} iframe`);
      if (activeFrame) {
        syncFrameHeight(activeFrame);
      }
    }

    function syncFrameHeight(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        if (!doc) return;
        const height = Math.max(
          doc.body ? doc.body.scrollHeight : 0,
          doc.documentElement ? doc.documentElement.scrollHeight : 0
        );
        if (height > 0) {
          iframe.style.height = `${height + 8}px`;
        }
      } catch (error) {
        // Same-origin is expected on GitHub Pages for these local files.
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => setActive(tab.dataset.target));
    });

    iframes.forEach((iframe) => {
      iframe.addEventListener('load', () => {
        syncFrameHeight(iframe);
        window.setTimeout(() => syncFrameHeight(iframe), 250);
        window.setTimeout(() => syncFrameHeight(iframe), 1000);
      });
    });

    window.addEventListener('resize', () => {
      const activeFrame = document.querySelector('.frame-wrap.active iframe');
      if (activeFrame) {
        syncFrameHeight(activeFrame);
      }
    });
  </script>
</body>
</html>
